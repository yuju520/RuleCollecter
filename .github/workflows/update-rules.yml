name: Update Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '20 21 * * *'
  push:
    paths:
      - 'sources.yaml'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Cache mihomo binary
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/mihomo
          key: mihomo-v1.19.20-linux-amd64

      - name: Setup mihomo
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          MIHOMO_VERSION="v1.19.20"
          MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          curl -fL --connect-timeout 30 --max-time 300 --retry 5 --retry-delay 15 --retry-connrefused \
            -o mihomo.gz "$MIHOMO_URL"
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/

      - name: Verify mihomo
        run: mihomo version

      - name: Run update script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/main.py

      - name: Commit and Push Changes
        run: |
          git add rules/ README.md reports/ || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "${{ env.BUILDTIME }} 🔄 Auto update rules"
            git push
          else
            echo "No changes to commit"
          fi
